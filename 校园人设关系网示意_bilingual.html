<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-zh="校园NPC社会关系图谱 - 60位角色" data-en="Campus NPC Social Graph - 60 Characters">校园NPC社会关系图谱 - 60位角色</title>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Microsoft YaHei','PingFang SC',sans-serif; background:#0a0e17; color:#e0e0e0; overflow:hidden; }
#app { display:flex; height:100vh; }
#graph-panel { flex:1; position:relative; }
#mynetwork { width:100%; height:100%; }
#side-panel { width:480px; background:#12182b; border-left:1px solid #1e2a45; overflow-y:auto; transition:transform .3s; display:flex; flex-direction:column; flex-shrink:0; min-width:320px; }
#side-panel.collapsed { transform:translateX(100%); }
#drag-handle { width:6px; cursor:col-resize; background:#1a2240; flex-shrink:0; position:relative; transition:background .15s; }
#drag-handle:hover, #drag-handle.dragging { background:#42a5f5; }
#drag-handle::before { content:''; position:absolute; left:1px; top:50%; transform:translateY(-50%); width:4px; height:46px; background:#37474f; border-radius:2px; }
#drag-handle:hover::before, #drag-handle.dragging::before { background:#90caf9; }
body.resizing { cursor:col-resize; user-select:none; }
body.resizing iframe, body.resizing canvas { pointer-events:none; }
.panel-header { padding:16px 20px; background:#1a2240; border-bottom:1px solid #1e2a45; display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
.panel-header h2 { font-size:16px; color:#90caf9; }
.panel-content { padding:16px 20px; overflow-y:auto; flex:1; }
.npc-name { font-size:22px; font-weight:bold; margin-bottom:4px; }
.npc-role { font-size:13px; color:#78909c; margin-bottom:16px; }
.section { margin-bottom:16px; }
.section-title { font-size:13px; font-weight:bold; color:#ffa726; margin-bottom:8px; padding-bottom:4px; border-bottom:1px solid #1e2a45; letter-spacing:1px; }
.field { margin-bottom:6px; font-size:13px; line-height:1.6; }
.field-label { color:#78909c; margin-right:6px; }
.field-value { color:#e0e0e0; }
.tag { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; margin:2px; }
.schedule-wrap { background:#0d1220; border-radius:8px; padding:12px; margin-top:8px; }
.sch-item { display:flex; align-items:flex-start; margin-bottom:6px; font-size:12px; line-height:1.5; }
.sch-time { color:#ffa726; min-width:60px; flex-shrink:0; font-weight:bold; }
.sch-act { color:#b0bec5; }
.placeholder { display:flex; align-items:center; justify-content:center; height:100%; color:#546e7a; font-size:15px; text-align:center; padding:40px; }
#legend { position:absolute; bottom:16px; left:16px; background:rgba(18,24,43,0.92); border-radius:10px; padding:14px 18px; border:1px solid #1e2a45; z-index:10; max-width:360px; }
#legend h4 { font-size:12px; color:#90caf9; margin-bottom:8px; }
.legend-row { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:6px; }
.legend-item { display:flex; align-items:center; font-size:11px; margin-right:8px; }
.legend-dot { width:10px; height:10px; border-radius:50%; margin-right:4px; flex-shrink:0; }
.legend-line { width:18px; height:3px; border-radius:2px; margin-right:4px; flex-shrink:0; }
#stats { position:absolute; top:16px; left:16px; background:rgba(18,24,43,0.92); border-radius:10px; padding:10px 16px; border:1px solid #1e2a45; z-index:10; font-size:12px; color:#78909c; }
#stats span { color:#ffa726; font-weight:bold; }
#search-box { position:absolute; top:16px; right:460px; z-index:10; }
#search-box input { padding:8px 14px; border-radius:20px; border:1px solid #1e2a45; background:#12182b; color:#e0e0e0; font-size:13px; width:220px; outline:none; }
#search-box input:focus { border-color:#42a5f5; }
.ctrl-btn { position:absolute; z-index:10; padding:6px 14px; border-radius:16px; border:1px solid #1e2a45; background:#1a2240; color:#90caf9; font-size:12px; cursor:pointer; }
.ctrl-btn:hover { background:#263259; }
#btn-lang { top:16px; right:16px; font-weight:bold; }
#btn-reset { top:16px; right:220px; }
#btn-toggle { top:16px; right:100px; }
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:#0a0e17; }
::-webkit-scrollbar-thumb { background:#1e2a45; border-radius:3px; }
/* ===== Tabs ===== */
.tabs { display:flex; background:#0d1220; border-bottom:1px solid #1e2a45; flex-shrink:0; }
.tab { flex:1; padding:10px 8px; text-align:center; color:#78909c; font-size:12px; cursor:pointer; border-bottom:2px solid transparent; user-select:none; }
.tab.active { color:#90caf9; border-bottom-color:#42a5f5; background:#12182b; }
.tab:hover { color:#b0bec5; }
.muted { color:#78909c; font-size:11px; }
.link { color:#42a5f5; cursor:pointer; text-decoration:underline dotted; }
.link:hover { color:#90caf9; }
/* ===== Culture chips ===== */
.chip { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; margin:2px 3px 2px 0; background:#1a2240; color:#90caf9; border:1px solid #263259; }
.chip.taboo { background:#3a1a1a; color:#ef9a9a; border-color:#5a2a2a; }
.chip.comfort { background:#1a3a2a; color:#a5d6a7; border-color:#2a5a3a; }
.dim-bar { display:flex; align-items:center; font-size:11px; margin:3px 0; }
.dim-label { width:120px; color:#78909c; }
.dim-track { flex:1; height:6px; background:#0d1220; border-radius:3px; position:relative; margin:0 8px; }
.dim-fill { height:100%; border-radius:3px; background:linear-gradient(90deg,#42a5f5,#ce93d8); }
.dim-num { width:30px; color:#ffa726; text-align:right; font-weight:bold; }
/* ===== Memory items ===== */
.mem-item { background:#0d1220; border-left:3px solid #42a5f5; padding:8px 10px; margin-bottom:6px; border-radius:4px; }
.mem-meta { font-size:10px; color:#78909c; margin-bottom:2px; display:flex; justify-content:space-between; }
.mem-text { font-size:12px; color:#cfd8dc; line-height:1.5; }
.mem-with { color:#90caf9; cursor:pointer; text-decoration:underline dotted; }
.mem-tone-warm { border-left-color:#ffa726; }
.mem-tone-tense { border-left-color:#ef5350; }
.mem-tone-focused { border-left-color:#26c6da; }
.mem-tone-casual { border-left-color:#78909c; }
.mem-tone-curious { border-left-color:#ce93d8; }
.mem-tone-gentle { border-left-color:#a5d6a7; }
.mem-tone-playful { border-left-color:#fff176; }
.mem-tone-decisive { border-left-color:#ff8a65; }
/* ===== Triplets ===== */
.triplet { background:#0d1220; padding:8px 10px; border-radius:6px; margin-bottom:6px; font-size:12px; line-height:1.6; }
.tri-line { display:flex; flex-wrap:wrap; align-items:center; gap:6px; }
.tri-subj { color:#90caf9; font-weight:bold; cursor:pointer; }
.tri-pred { color:#ffa726; font-style:italic; }
.tri-obj { color:#a5d6a7; font-weight:bold; cursor:pointer; }
.tri-meta { font-size:10px; color:#78909c; margin-top:3px; }
.tri-narr { color:#cfd8dc; margin-top:3px; font-size:11.5px; }
.tri-cn { color:#ce93d8; margin-top:2px; font-size:10.5px; font-style:italic; }
/* ===== Edge summary ===== */
.em-summary { background:#0d1220; padding:10px 12px; border-radius:6px; margin-bottom:12px; font-size:12px; line-height:1.6; color:#cfd8dc; }
.em-stat { display:inline-block; margin-right:14px; font-size:11px; color:#78909c; }
.em-stat b { color:#ffa726; font-size:13px; }
/* ===== Scenes ===== */
.scene-filters { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; }
.filter-chip { padding:3px 9px; border-radius:12px; background:#1a2240; color:#78909c; font-size:11px; cursor:pointer; border:1px solid #263259; user-select:none; }
.filter-chip.active { background:#263259; color:#90caf9; border-color:#42a5f5; }
.scene-card { background:#0d1220; border-radius:8px; padding:12px; margin-bottom:10px; border-left:3px solid #ffa726; }
.scene-title { font-size:14px; color:#ffe082; font-weight:bold; margin-bottom:4px; }
.scene-meta { font-size:11px; color:#78909c; margin-bottom:6px; }
.scene-narr { font-size:12px; color:#cfd8dc; line-height:1.6; margin:6px 0; }
.scene-people { font-size:11px; margin-bottom:4px; }
.scene-people .chip { background:#263259; color:#90caf9; cursor:pointer; }
.scene-toggle { color:#42a5f5; cursor:pointer; font-size:11px; margin-top:4px; user-select:none; }
.scene-trigger { color:#90a4ae; font-size:11px; font-style:italic; margin-bottom:4px; }
/* ===== Timeline ===== */
.tl-day { font-size:13px; color:#90caf9; margin:10px 0 4px; padding-bottom:3px; border-bottom:1px dashed #1e2a45; font-weight:bold; }
.tl-event { font-size:11.5px; line-height:1.5; padding:5px 8px; margin-bottom:3px; background:#0d1220; border-radius:4px; border-left:2px solid #1e2a45; }
.tl-time { color:#ffa726; font-weight:bold; min-width:46px; display:inline-block; }
.tl-loc { color:#78909c; font-size:10px; margin-left:4px; }
.tl-cn { color:#ce93d8; font-size:10px; margin-top:2px; font-style:italic; }
.tl-name { color:#90caf9; cursor:pointer; }
.tl-name:hover { color:#fff; }
.tl-controls { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px; align-items:center; }
.weather-clear  { color:#ffd54f; }
.weather-rain   { color:#4fc3f7; }
.weather-overcast { color:#90a4ae; }
.weather-hot    { color:#ff7043; }
.weather-cold   { color:#80deea; }
.weather-snow   { color:#e1f5fe; }
/* ===== Footprint (per-NPC weekly) ===== */
.fp-wrap { background:#0d1220; border-radius:8px; padding:10px 8px; margin-top:6px; overflow-x:auto; }
.fp-grid-row { display:flex; align-items:center; margin-bottom:2px; }
.fp-day-label { width:34px; font-size:11px; color:#90caf9; flex-shrink:0; }
.fp-cell { width:13px; height:18px; margin-right:1px; border-radius:2px; flex-shrink:0; cursor:pointer; transition:transform .1s; }
.fp-cell:hover { transform:scale(1.4); outline:1px solid #fff; z-index:5; position:relative; }
.fp-tick-row { display:flex; margin-left:34px; margin-top:4px; height:14px; }
.fp-tick-label { width:13px; font-size:8px; color:#546e7a; margin-right:1px; text-align:left; flex-shrink:0; transform:rotate(-90deg) translateX(-3px); transform-origin:left center; white-space:nowrap; }
.fp-legend { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; font-size:10px; color:#90a4ae; }
.fp-legend-item { display:flex; align-items:center; }
.fp-legend-swatch { width:10px; height:10px; border-radius:2px; margin-right:3px; }
.fp-stats { display:flex; gap:16px; flex-wrap:wrap; font-size:11px; color:#78909c; margin-top:6px; }
.fp-stats b { color:#ffa726; }
.fp-tooltip { position:fixed; background:#1a2240; border:1px solid #42a5f5; padding:6px 10px; border-radius:6px; font-size:11px; color:#cfd8dc; pointer-events:none; z-index:200; display:none; max-width:260px; line-height:1.5; }
.fp-tooltip.open { display:block; }
.fp-toplocs { display:flex; flex-wrap:wrap; gap:4px; margin-top:6px; }
.fp-toploc { background:#1a2240; padding:3px 8px; border-radius:10px; font-size:11px; color:#cfd8dc; }
.fp-toploc b { color:#ffa726; margin-right:4px; }
/* ===== Heatmap tab ===== */
.hm-row { display:flex; align-items:center; margin-bottom:5px; gap:8px; }
.hm-space { width:108px; font-size:12px; color:#cfd8dc; flex-shrink:0; text-align:right; padding:2px 0; }
.hm-bar-wrap { flex:1; height:20px; background:#0d1220; border-radius:4px; position:relative; min-width:80px; box-shadow:inset 0 0 0 1px #1a2240; overflow:hidden; }
.hm-bar { height:100%; border-radius:4px; box-shadow:0 0 12px -2px currentColor; }
.hm-bar-label { position:absolute; left:8px; top:2px; font-size:10.5px; color:#fff; text-shadow:0 1px 2px rgba(0,0,0,0.7); pointer-events:none; }
.hm-num { width:54px; text-align:right; color:#ffe082; font-size:11.5px; flex-shrink:0; font-family:Consolas,monospace; }
.hm-card { background:#0d1220; border-radius:8px; padding:11px 13px; margin-bottom:8px; border-left:3px solid #ffa726; }
.hm-card-title { font-size:13px; color:#ffe082; margin-bottom:4px; font-weight:bold; }
.hm-card-meta { font-size:11px; color:#78909c; margin-bottom:4px; font-family:Consolas,monospace; }
.hm-top-list { font-size:11px; color:#cfd8dc; margin-top:4px; display:flex; flex-wrap:wrap; gap:4px; }
.hm-top-list .chip { background:#263259; color:#90caf9; cursor:pointer; }
.hm-grid-wrap { background:#0a0e17; padding:14px 12px 8px; border-radius:8px; overflow-x:auto; margin:8px 0 14px; box-shadow:inset 0 0 0 1px #1a2240; }
.hm-grid { display:flex; flex-direction:column; gap:2px; min-width:max-content; }
.hm-grid-row { display:flex; align-items:center; gap:2px; }
.hm-grid-label { width:96px; font-size:11px; color:#cfd8dc; text-align:right; padding-right:6px; flex-shrink:0; }
.hm-grid-cell { width:14px; height:18px; flex-shrink:0; border-radius:2px; cursor:default; transition:transform .08s; }
.hm-grid-cell:hover { transform:scale(1.4); outline:2px solid #fff; z-index:5; position:relative; }
.hm-grid-tick { width:14px; font-size:9px; color:#78909c; text-align:center; flex-shrink:0; }
.hm-grid-tick.major { color:#cfd8dc; font-weight:bold; }
.hm-grid-axis { display:flex; gap:2px; margin-left:96px; padding-left:6px; margin-bottom:4px; }
.hm-colorbar-wrap { display:flex; align-items:center; gap:8px; margin:6px 0 10px; font-size:10px; color:#90a4ae; }
.hm-colorbar { flex:1; max-width:300px; height:14px; border-radius:3px; box-shadow:inset 0 0 0 1px #1a2240; }
.hm-cb-tick { display:flex; justify-content:space-between; max-width:300px; flex:1; font-size:9px; color:#78909c; font-family:Consolas,monospace; }
.hm-section-hint { font-size:11px; color:#78909c; line-height:1.55; margin-bottom:8px; padding:6px 8px; background:#0d1220; border-left:2px solid #42a5f5; border-radius:0 4px 4px 0; }
</style>
</head>
<body>
<div id="app">
  <div id="graph-panel">
    <div id="mynetwork"></div>
    <div id="stats">
      <span data-zh="节点" data-en="Nodes">节点</span>: <span>60</span> |
      <span data-zh="关系" data-en="Edges">关系</span>: <span>123</span>

      <h4 style="margin-top:8px;" data-zh="关系类型" data-en="Relation Types">关系类型</h4>
      <div class="legend-row"><div class="legend-item"><div class="legend-line" style="background:#4FC3F7"></div><span data-zh="学术/同门" data-en="Academic/Cohort">学术/同门</span></div><div class="legend-item"><div class="legend-line" style="background:#66BB6A"></div><span data-zh="朋友/同好" data-en="Friends/Peers">朋友/同好</span></div><div class="legend-item"><div class="legend-line" style="background:#AB47BC"></div><span data-zh="师生/职能" data-en="Teacher-student">师生/职能</span></div><div class="legend-item"><div class="legend-line" style="background:#FF8A65"></div><span data-zh="合作/项目" data-en="Collaboration">合作/项目</span></div><div class="legend-item"><div class="legend-line" style="background:#FF7043"></div><span data-zh="竞争/张力" data-en="Rivalry/Tension">竞争/张力</span></div><div class="legend-item"><div class="legend-line" style="background:#FFD54F"></div><span data-zh="崇拜/请教" data-en="Admiration/Asking">崇拜/请教</span></div><div class="legend-item"><div class="legend-line" style="background:#E0E0E0"></div><span data-zh="弱连接/偶遇" data-en="Weak tie/Chance">弱连接/偶遇</span></div><div class="legend-item"><div class="legend-line" style="background:#E91E63"></div><span data-zh="暧昧/吸引" data-en="Attraction/Flirt">暧昧/吸引</span></div></div>

  </div>

  <div id="side-panel">
    <div class="panel-header"><h2 id="panel-title" data-zh="NPC 详情" data-en="NPC Details">NPC 详情</h2></div>

      <div class="tab active" data-tab="npc" data-zh="NPC" data-en="NPC">NPC</div>
      <div class="tab" data-tab="edge" data-zh="关系" data-en="Edge">关系</div>
      <div class="tab" data-tab="scenes" data-zh="场景库" data-en="Scenes">场景库</div>

    </div>
  </div>
</div>

function renderCultureSection(c) {

function renderMemorySection(id, mem) {
  const lang = currentLang;
  const title = lang === 'en' ? '🧠 Weekly Memory (Top 25)' : '🧠 本周记忆（按显著度 Top 25）';
  let h = '<div class="section"><div class="section-title">' + title + '</div>';
  mem.slice(0, 25).forEach(m => {

    const withName = lang === 'en' ? m.with_name_en : m.with_name_zh;

    h += '<div class="mem-meta"><span>' + m.ts + '  ·  ' + escapeHtml(loc || '') + '</span><span>显著度 ' + (m.salience||0).toFixed(2) + '  亲密 ' + ad + '</span></div>';
    h += '<div class="mem-text">' + escapeHtml(text || '') + '  ';

function collectRelationsForNPC(id) {
  const out = [];
  const idx = window.SIM_EDGES || {};
  Object.keys(idx).forEach(k => {
    const r = idx[k];
    if (r.from === id || r.to === id) out.push(r);
  });
  out.sort((a, b) => Math.abs(b.affinity_total) - Math.abs(a.affinity_total));
  return out;
}

function renderRelationsRadar(id, radar) {
  const lang = currentLang;
  const title = lang === 'en' ? '📡 Relations This Week' : '📡 本周关系雷达';
  let h = '<div class="section"><div class="section-title">' + title + '</div>';
  radar.slice(0, 12).forEach(r => {
    const otherId = r.from === id ? r.to : r.from;
    const lbl = lang === 'en' ? r.edge_label_en : r.edge_label_zh;
    const sum = lang === 'en' ? r.summary_en : r.summary_zh;
    const trend = r.affinity_total > 0.05 ? '↑' : (r.affinity_total < -0.05 ? '↓' : '→');
    const trendCol = r.affinity_total > 0.05 ? '#a5d6a7' : (r.affinity_total < -0.05 ? '#ef9a9a' : '#90a4ae');
    h += '<div class="mem-item" style="border-left-color:' + trendCol + '">';
    h += '<div class="mem-meta"><span class="mem-with" data-jump-edge="' + edgeKey(r.from, r.to) + '">' + escapeHtml(NAME_OF(otherId, lang)) + '  ·  ' + escapeHtml(lbl) + '</span>';
    h += '<span style="color:' + trendCol + '">' + trend + ' ' + r.affinity_total.toFixed(2) + '  · ' + r.n_interactions + 'x</span></div>';
    h += '<div class="mem-text">' + escapeHtml(sum || '') + '</div>';
    h += '</div>';
  });
  h += '</div>';
  return h;
}

  const trigger = lang === 'en' ? s.trigger_en : s.trigger_zh;

  const tags = lang === 'en' ? (s.tags_en || []) : (s.tags_zh || []);

  h += '<span>🕒 ' + escapeHtml(s.time_band) + '</span> · ';

  h += '<div class="scene-trigger">' + escapeHtml(trigger) + '</div>';

  s.participant_ids.forEach((pid, i) => {

    h += '<div id="tri-' + s.id + '" style="display:none;margin-top:6px">';

    h += '</div>';
  }
  h += '</div>';
  return h;
}

function renderTimeline() {
  const tl = window.SIM_TIMELINE || [];

  h += '<div class="tl-controls">';
  h += '<span class="muted">' + T('日期','Day') + ':</span>';
  days.forEach(d => {
    const lbl = d === 'all' ? T('全部','All') : d.slice(5);
    const cls = timelineDayFilter === d ? 'filter-chip active' : 'filter-chip';
    h += '<span class="' + cls + '" data-filter="day" data-val="' + d + '">' + lbl + '</span>';
  });
  h += '</div>';

  const filtered = tl.filter(e => timelineDayFilter === 'all' || e.ts.startsWith(timelineDayFilter));

  let lastDay = '';
  filtered.forEach(e => {
    const day = e.ts.slice(0, 10);
    if (day !== lastDay) {
      lastDay = day;
      const dn = currentLang === 'en' ? e.day_en : e.day_zh;
      h += '<div class="tl-day">' + day + ' (' + (dn || '') + ')</div>';
    }
    const time = e.ts.slice(11, 16);
    const sName = NAME_OF(e.s, currentLang);
    const oName = NAME_OF(e.o, currentLang);
    const pred = currentLang === 'en' ? e.p_en : e.p_zh;
    const narr = currentLang === 'en' ? e.n_en : e.n_zh;
    const loc  = currentLang === 'en' ? e.loc_en : e.loc_zh;
    const cn   = currentLang === 'en' ? e.cn_en : e.cn_zh;
    const adSign = e.ad >= 0 ? '+' : '';
    const adCol = e.ad >= 0 ? '#a5d6a7' : '#ef9a9a';
    h += '<div class="tl-event">';
    h += '<span class="tl-time">' + time + '</span>';
    h += ' <span class="tl-name" data-jump-npc="' + e.s + '">' + escapeHtml(sName) + '</span>';
    h += ' <span class="tri-pred">' + escapeHtml(pred) + '</span>';
    h += ' <span class="tl-name" data-jump-npc="' + e.o + '">' + escapeHtml(oName) + '</span>';
    h += ' <span class="tl-loc">@' + escapeHtml(loc) + '</span>';
    h += ' <span style="color:' + adCol + ';font-size:10px;margin-left:4px">' + adSign + (e.ad||0).toFixed(2) + '</span>';
    h += '<div class="tri-narr" style="margin-top:2px">' + escapeHtml(narr) + '</div>';
    if (cn) h += '<div class="tl-cn">⌬ ' + escapeHtml(cn) + '</div>';
    h += '</div>';
  });

  document.getElementById('panel-body').innerHTML = h;
  bindPanelClicks();
}

function bindPanelClicks() {
  document.querySelectorAll('[data-jump-npc]').forEach(el => {
    el.addEventListener('click', (ev) => {
      const id = parseInt(el.getAttribute('data-jump-npc'), 10);
      if (!isNaN(id) && NPC_DATA[id]) {
        switchTab('npc');
        renderNPC(id);
        try { network.focus(id, { scale:1.2, animation:true }); } catch(e) {}
      }
      ev.stopPropagation();
    });
  });
  document.querySelectorAll('[data-jump-edge]').forEach(el => {
    el.addEventListener('click', (ev) => {
      const k = el.getAttribute('data-jump-edge');
      const [a, b] = k.split('-').map(Number);
      switchTab('edge');
      renderEdgePanel(a, b);
      ev.stopPropagation();
    });
  });
  document.querySelectorAll('[data-toggle]').forEach(el => {
    el.addEventListener('click', () => {
      const tid = el.getAttribute('data-toggle');
      const target = document.getElementById(tid);
      if (target) {
        const open = target.style.display !== 'none';
        target.style.display = open ? 'none' : 'block';
        el.textContent = el.textContent.replace(open ? '▴' : '▾', open ? '▾' : '▴');
      }
    });
  });
  document.querySelectorAll('.scene-filters .filter-chip').forEach(el => {
    el.addEventListener('click', () => {
      const f = el.getAttribute('data-filter');
      const v = el.getAttribute('data-val');
      if (f === 'space' || f === 'weather') { sceneFilters[f] = v; renderScenes(); }
      else if (f === 'day') { timelineDayFilter = v; renderTimeline(); }
    });
  });
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('#side-tabs .tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tab);
  });
  if (tab === 'npc') {
    if (currentNodeId !== null) renderNPC(currentNodeId);
    else { document.getElementById('panel-title').textContent = T('NPC 详情','NPC Details');
           document.getElementById('panel-body').innerHTML = '<div class="placeholder">' + T('点击图谱中的节点查看 NPC 完整画像、文化身份与本周记忆','Click a node to see NPC profile, cultural identity & memory.') + '</div>'; }
  } else if (tab === 'edge') {
    if (currentEdgeKey) {
      const [a, b] = currentEdgeKey.split('-').map(Number);
      renderEdgePanel(a, b);
    } else {
      document.getElementById('panel-title').textContent = T('关系履历','Edge History');
      document.getElementById('panel-body').innerHTML = '<div class="placeholder">' + T('点击图谱中的连线查看双方本周三元组互动履历','Click a graph edge to see this week\'s triplet interactions.') + '</div>';
    }
  } else if (tab === 'scenes') {
    renderScenes();
  } else if (tab === 'timeline') {
    renderTimeline();
  } else if (tab === 'heatmap') {
    renderHeatmap();
  }
}

const ACT_PALETTE = ['#455a64','#ffa726','#ce93d8','#42a5f5','#26a69a','#f48fb1','#ef5350','#ab47bc','#66bb6a','#80cbc4','#a1887f','#fff176','#90a4ae','#7986cb','#bdbdbd','#5d4037','#37474f'];
function activityColor(ai) { return ACT_PALETTE[ai % ACT_PALETTE.length] || '#455a64'; }

function bindFootprintTooltip() {
  const tip = document.getElementById('fp-tooltip');
  if (!tip) return;
  document.querySelectorAll('[data-fp-tip]').forEach(el => {
    el.addEventListener('mousemove', (ev) => {
      tip.textContent = el.getAttribute('data-fp-tip');
      tip.style.left = (ev.clientX + 14) + 'px';
      tip.style.top = (ev.clientY + 14) + 'px';
      tip.classList.add('open');
    });
    el.addEventListener('mouseleave', () => { tip.classList.remove('open'); });
  });
}

function renderFootprintSection(id) {
  const meta = window.SIM_FOOTPRINT_META;
  const fp = (window.SIM_FOOTPRINT || {})[id];
  if (!meta || !fp) return '';
  const lang = currentLang;
  const days = lang === 'en' ? meta.days_en : meta.days_zh;
  const ticks = meta.ticks;
  const locPool = lang === 'en' ? meta.loc_pool_en : meta.loc_pool_zh;
  const actPool = lang === 'en' ? meta.act_pool_en : meta.act_pool_zh;
  const title = lang === 'en' ? '🗺️ Weekly Footprint' : '🗺️ 一周足迹';
  const hint = lang === 'en' ? 'Each cell = 30 min. Color = activity type. Hover for details.' : '每格 30 分钟，颜色代表活动类型。鼠标悬停看详情。';

  const locCount = {};
  const actCount = {};
  let totalCells = 0;
  for (let d = 0; d < fp.length; d++) {
    for (let t = 0; t < fp[d].length; t++) {
      const cell = fp[d][t]; if (!cell) continue;
      const li = cell[0], ai = cell[1];
      locCount[li] = (locCount[li] || 0) + 1;
      actCount[ai] = (actCount[ai] || 0) + 1;
      totalCells++;
    }
  }
  const topLocs = Object.entries(locCount).sort((a,b)=>b[1]-a[1]).slice(0, 6);
  const topActs = Object.entries(actCount).sort((a,b)=>b[1]-a[1]);

  let h = '<div class="section"><div class="section-title">' + title + '</div>';
  h += '<div class="muted">' + hint + '</div>';
  h += '<div class="fp-stats">';
  h += '<span><b>' + Object.keys(locCount).length + '</b> ' + (lang==='en'?'spaces visited':'到访空间') + '</span>';
  h += '<span><b>' + Object.keys(actCount).length + '</b> ' + (lang==='en'?'activity types':'活动类型') + '</span>';
  h += '<span><b>' + totalCells + '</b> ' + (lang==='en'?'30-min slots':'半小时格') + '</span>';
  h += '</div>';

  h += '<div class="fp-wrap">';
  for (let d = 0; d < fp.length; d++) {
    h += '<div class="fp-grid-row"><div class="fp-day-label">' + days[d] + '</div>';
    for (let t = 0; t < fp[d].length; t++) {
      const cell = fp[d][t]; if (!cell) continue;
      const li = cell[0], ai = cell[1];
      const color = activityColor(ai);
      const tip = days[d] + ' ' + ticks[t] + ' · ' + locPool[li] + ' · ' + actPool[ai];
      h += '<div class="fp-cell" style="background:' + color + '" data-fp-tip="' + escapeHtml(tip) + '"></div>';
    }
    h += '</div>';
  }
  h += '<div class="fp-tick-row">';
  for (let t = 0; t < ticks.length; t++) {
    const lbl = (t % 4 === 0) ? ticks[t] : '';
    h += '<div class="fp-tick-label">' + lbl + '</div>';
  }
  h += '</div></div>';

  h += '<div class="muted" style="margin-top:8px">' + (lang==='en'?'Top spaces this week:':'本周到访最多空间：') + '</div>';
  h += '<div class="fp-toplocs">';
  topLocs.forEach(([li, cnt]) => {
    h += '<span class="fp-toploc"><b>' + cnt + '</b>' + escapeHtml(locPool[li]) + '</span>';
  });
  h += '</div>';

  h += '<div class="muted" style="margin-top:8px">' + (lang==='en'?'Activity legend (sorted by hours):':'活动图例（按时段数排序）：') + '</div>';
  h += '<div class="fp-legend">';
  topActs.forEach(([ai, cnt]) => {
    h += '<div class="fp-legend-item"><div class="fp-legend-swatch" style="background:' + activityColor(ai) + '"></div>' + escapeHtml(actPool[ai]) + ' (' + cnt + ')</div>';
  });
  h += '</div>';

  h += '</div>';
  return h;
}

// 7-stop "inferno-like" sequential colormap: dark navy → purple → magenta → orange → yellow.
const HEAT_STOPS = [
  [13, 18, 39],     // 0.00  near-black
  [40, 11, 84],     // 0.16  deep purple
  [101, 21, 110],   // 0.33  violet
  [165, 44, 96],    // 0.50  magenta
  [222, 73, 65],    // 0.66  red-orange
  [248, 142, 35],   // 0.83  orange
  [252, 230, 110]   // 1.00  pale yellow
];
function heatColor(t) {
  if (t <= 0) return '#0a0e17';
  if (t >= 1) { const c = HEAT_STOPS[HEAT_STOPS.length - 1]; return 'rgb(' + c[0] + ',' + c[1] + ',' + c[2] + ')'; }
  const seg = t * (HEAT_STOPS.length - 1);
  const i = Math.floor(seg);
  const f = seg - i;
  const a = HEAT_STOPS[i], b = HEAT_STOPS[i + 1];
  const r = Math.round(a[0] + (b[0] - a[0]) * f);
  const g = Math.round(a[1] + (b[1] - a[1]) * f);
  const bl = Math.round(a[2] + (b[2] - a[2]) * f);
  return 'rgb(' + r + ',' + g + ',' + bl + ')';
}

function renderHeatmap() {
  const hm = window.SIM_HEATMAP || {};
  const meta = window.SIM_FOOTPRINT_META;
  const lang = currentLang;
  document.getElementById('panel-title').textContent = T('校园活动热度','Campus Activity Heat');

  // Drop the dorm: it dominates because every NPC sleeps + late-night fallback
  // there, which crushes the contrast for all the more-interesting public spaces.
  const DORM_ZH = '宿舍';
  const allEntries = Object.entries(hm).sort((a,b)=>b[1].total_npc_ticks - a[1].total_npc_ticks);
  const dormEntry = allEntries.find(([sp]) => sp === DORM_ZH);
  const entries = allEntries.filter(([sp]) => sp !== DORM_ZH);
  if (!entries.length) {
    document.getElementById('panel-body').innerHTML = '<div class="placeholder">' + T('暂无热度数据','No heatmap data') + '</div>';
    return;
  }

  const maxTotal = entries[0][1].total_npc_ticks;
  let h = '';
  if (dormEntry) {
    const dn = lang === 'en' ? dormEntry[1].space_en : dormEntry[1].space_zh;
    h += '<div class="hm-section-hint" style="border-left-color:#78909c;color:#90a4ae">' + T('已隐藏“','Hiding "') + escapeHtml(dn) + T('”（累计 ','" (') + dormEntry[1].total_npc_ticks + T(' 人次时段，因每位 NPC 都会在此过夜，会压扁其它空间的对比度）。','npc-ticks · every NPC sleeps there and squashes the contrast of every other space).') + '</div>';
  }

  // ----- Section 1: ranking bars (sqrt-scaled width + heat-mapped color) -----
  h += '<div class="section"><div class="section-title">' + T('🌡️ 空间热度排行','🌡️ Space Heat Ranking') + '</div>';
  h += '<div class="hm-section-hint">' + T('一周内每个空间被访问的累计 30 分钟时段（人次 × 半小时格）。条长按 √ 缩放以便弱热点也能看见，色温按相对热度。','Total 30-min slots visited per space (NPC × tick) across the week. Bar width is √-scaled so weak hotspots stay visible; hue follows relative heat.') + '</div>';
  entries.forEach(([sp, data]) => {
    const v = data.total_npc_ticks;
    const tNorm = v / maxTotal;                      // raw 0..1
    const tWidth = Math.sqrt(tNorm);                 // sqrt-scaled width
    const w = (tWidth * 100).toFixed(1);
    const col = heatColor(tWidth);
    const dispName = lang === 'en' ? data.space_en : data.space_zh;
    h += '<div class="hm-row">';
    h += '<div class="hm-space">' + escapeHtml(dispName) + '</div>';
    h += '<div class="hm-bar-wrap"><div class="hm-bar" style="width:' + w + '%;background:linear-gradient(90deg,' + heatColor(Math.max(0.1, tWidth*0.4)) + ',' + col + ');color:' + col + '"></div>';
    if (tWidth > 0.45) h += '<span class="hm-bar-label">' + v + '</span>';
    h += '</div>';
    h += '<div class="hm-num">' + v + '</div>';
    h += '</div>';
  });
  h += '</div>';

  // ----- Section 2: space × tick heat grid (sqrt-scaled, inferno) -----
  if (meta && meta.ticks) {
    const ticks = meta.ticks;
    let maxCellVal = 0;
    entries.forEach(([sp, data]) => {
      Object.values(data.by_tick || {}).forEach(v => { if (v > maxCellVal) maxCellVal = v; });
    });

    h += '<div class="section"><div class="section-title">' + T('🔥 空间 × 时间 热力网格','🔥 Space × Time Heat Grid') + '</div>';
    h += '<div class="hm-section-hint">' + T('横轴 07:00 → 次日 03:00（每格 30 分钟），纵轴 Top 20 空间。颜色按 √ 缩放，弱热也可见；最热 = 黄。鼠标悬停看精确数。','X = 07:00 → next-day 03:00 (30-min cells), Y = top 20 spaces. Color is √-scaled so weak heat stays readable; hottest = pale yellow. Hover any cell for exact count.') + '</div>';

    // colorbar
    const cbStops = [];
    for (let i = 0; i <= 6; i++) cbStops.push(heatColor(i / 6));
    h += '<div class="hm-colorbar-wrap">';
    h += '<span>' + T('冷','low') + '</span>';
    h += '<div class="hm-colorbar" style="background:linear-gradient(90deg,' + cbStops.join(',') + ')"></div>';
    h += '<span>' + T('热','high') + '</span>';
    h += '</div>';
    h += '<div class="hm-cb-tick"><span>0</span><span>' + Math.round(Math.sqrt(0.25) * maxCellVal) + '</span><span>' + Math.round(Math.sqrt(0.5) * maxCellVal) + '</span><span>' + Math.round(Math.sqrt(0.75) * maxCellVal) + '</span><span>' + maxCellVal + '</span></div>';

    h += '<div class="hm-grid-wrap">';
    // top axis: hour labels (every 2h = 4 ticks)
    h += '<div class="hm-grid">';
    h += '<div class="hm-grid-row"><div class="hm-grid-label" style="color:#78909c">' + T('空间 ＼ 时刻','space ＼ time') + '</div>';
    for (let t = 0; t < ticks.length; t++) {
      const major = (t % 4 === 0);
      const lbl = major ? ticks[t].slice(0,2) : '';
      h += '<div class="hm-grid-tick' + (major ? ' major' : '') + '">' + lbl + '</div>';
    }
    h += '</div>';

    entries.slice(0, 20).forEach(([sp, data]) => {
      const dispName = lang === 'en' ? data.space_en : data.space_zh;
      const shortName = dispName.length > 9 ? dispName.slice(0, 9) : dispName;
      h += '<div class="hm-grid-row"><div class="hm-grid-label" title="' + escapeHtml(dispName) + '">' + escapeHtml(shortName) + '</div>';
      for (let t = 0; t < ticks.length; t++) {
        const v = data.by_tick[ticks[t]] || 0;
        const tNorm = maxCellVal ? Math.sqrt(v / maxCellVal) : 0;
        const bg = v > 0 ? heatColor(tNorm) : '#0a0e17';
        h += '<div class="hm-grid-cell" style="background:' + bg + '" title="' + ticks[t] + '  ·  ' + escapeHtml(dispName) + '  ·  ' + v + ' ' + T('人','npcs') + '"></div>';
      }
      h += '</div>';
    });
    h += '</div></div></div>';
  }

  // ----- Section 3: per-space cards -----
  h += '<div class="section"><div class="section-title">' + T('📊 各空间 Top NPC','📊 Top NPCs by Space') + '</div>';
  entries.slice(0, 18).forEach(([sp, data]) => {
    const dispName = lang === 'en' ? data.space_en : data.space_zh;
    const heatVal = Math.sqrt(data.total_npc_ticks / maxTotal);
    const accent = heatColor(heatVal);
    h += '<div class="hm-card" style="border-left-color:' + accent + '">';
    h += '<div class="hm-card-title">' + escapeHtml(dispName) + ' <span style="color:#78909c;font-size:11px;font-weight:normal">· ' + data.total_npc_ticks + ' ' + T('人次时段','npc-ticks') + '</span></div>';
    const byDay = lang === 'en' ? data.by_day_en : data.by_day_zh;
    if (byDay) {
      const order = lang === 'en' ? ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'] : ['周一','周二','周三','周四','周五','周六','周日'];
      const parts = order.filter(k => byDay[k] != null).map(k => k + ':' + byDay[k]);
      if (parts.length) h += '<div class="hm-card-meta">' + escapeHtml(parts.join('  ')) + '</div>';
    }
    h += '<div class="hm-top-list">';
    (data.top_npcs || []).forEach(p => {
      const pn = lang === 'en' ? p.name_en : p.name_zh;
      h += '<span class="chip" data-jump-npc="' + p.id + '">' + escapeHtml(pn) + ' · ' + p.ticks + '</span>';
    });
    h += '</div>';
    h += '</div>';
  });
  h += '</div>';

  document.getElementById('panel-body').innerHTML = h;
  bindPanelClicks();
}

function rerenderCurrentTab() {
  switchTab(currentTab);
}

network.on('click', function(params) {
  if (params.nodes.length > 0) {
    const nodeId = params.nodes[0];
    switchTab('npc');
    renderNPC(nodeId);
    const connected = network.getConnectedNodes(nodeId);
    nodes.forEach(function(n) {
      if (n.id === nodeId) {
        nodes.update({id:n.id, opacity:1, font:{size:14,color:'#fff'}});
      } else if (connected.includes(n.id)) {
        nodes.update({id:n.id, opacity:1, font:{size:12,color:'#b0bec5'}});
      } else {
        nodes.update({id:n.id, opacity:0.15, font:{size:10,color:'#546e7a'}});
      }
    });
  } else if (params.edges.length > 0) {
    const eid = params.edges[0];
    const e = edgesData.get(eid);
    if (e) { switchTab('edge'); renderEdgePanel(e.from, e.to); }
  }
});

network.on('deselectNode', function() {
  nodes.forEach(function(n) {
    nodes.update({id:n.id, opacity:1, font:{size:12,color:'#b0bec5'}});
  });
});

document.getElementById('searchInput').addEventListener('input', function(e) {
  const q = e.target.value.toLowerCase();
  if (!q) {
    nodes.forEach(function(n) { nodes.update({id:n.id,opacity:1}); });
    return;
  }
  nodes.forEach(function(n) {
    const npc = NPC_DATA[n.id];
    const hay = [npc.name, npc.role, npc.major, npc.name_en, npc.role_en, npc.major_en].join(' ').toLowerCase();
    const match = hay.includes(q);
    nodes.update({id:n.id, opacity: match ? 1 : 0.1});
  });
});

document.getElementById('btn-reset').addEventListener('click', function() {
  network.fit({ animation: true });
  nodes.forEach(function(n) { nodes.update({id:n.id,opacity:1,font:{size:12,color:'#b0bec5'}}); });
});

let panelOpen = true;
document.getElementById('btn-toggle').addEventListener('click', function() {
  panelOpen = !panelOpen;
  document.getElementById('side-panel').classList.toggle('collapsed');
  this.dataset.zh = panelOpen ? '收起面板' : '展开面板';

// ========== 语言切换 ==========
function applyLang(lang) {
  currentLang = lang;
  document.documentElement.lang = lang === 'en' ? 'en' : 'zh-CN';
  // 所有带 data-zh / data-en 的节点
  document.querySelectorAll('[data-zh]').forEach(function(el) {
    const val = el.dataset[lang];
    if (val !== undefined) el.innerHTML = val;
  });
  // 输入框占位符
  const si = document.getElementById('searchInput');
  si.placeholder = si.dataset[lang + 'Ph'] || si.placeholder;
  // title
  const titleEl = document.querySelector('title');
  if (titleEl && titleEl.dataset[lang]) document.title = titleEl.dataset[lang];
  // 切换按钮文字
  document.getElementById('btn-lang').textContent = lang === 'zh' ? 'EN' : '中';
  // 更新节点 label / title
  nodes.forEach(function(n) {
    nodes.update({
      id: n.id,
      label: n['label_' + lang],
      title: n['title_' + lang],
    });
  });
  // 更新边 label
  edgesData.forEach(function(e) {
    edgesData.update({ id: e.id, label: e['label_' + lang] });
  });
  rerenderCurrentTab();
}

document.getElementById('btn-lang').addEventListener('click', function() {
  applyLang(currentLang === 'zh' ? 'en' : 'zh');
});

// Tab 切换绑定
document.querySelectorAll('#side-tabs .tab').forEach(function(t) {
  t.addEventListener('click', function() { switchTab(t.dataset.tab); });
});

// ===== 侧栏宽度拖拽 =====
(function() {
  const handle = document.getElementById('drag-handle');
  const panel  = document.getElementById('side-panel');
  if (!handle || !panel) return;
  const MIN_W = 320;
  let startX = 0, startW = 0, dragging = false;

  // restore previous width if any
  try {
    const w = parseInt(localStorage.getItem('npcGraphPanelW'), 10);
    if (!isNaN(w) && w >= MIN_W) panel.style.width = Math.min(w, window.innerWidth - 200) + 'px';
  } catch(e) {}

  function onMove(ev) {
    if (!dragging) return;
    const maxW = window.innerWidth - 200;       // keep at least 200px for graph
    let w = startW + (startX - ev.clientX);
    if (w < MIN_W) w = MIN_W;
    if (w > maxW) w = maxW;
    panel.style.width = w + 'px';
  }
  function onUp() {
    if (!dragging) return;
    dragging = false;
    handle.classList.remove('dragging');
    document.body.classList.remove('resizing');
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    try { localStorage.setItem('npcGraphPanelW', parseInt(panel.style.width, 10)); } catch(e) {}
    try { network.redraw(); } catch(e) {}
  }
  handle.addEventListener('mousedown', function(ev) {
    dragging = true;
    startX = ev.clientX;
    startW = panel.getBoundingClientRect().width;
    handle.classList.add('dragging');
    document.body.classList.add('resizing');
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    ev.preventDefault();
  });
  // Double-click handle to reset to 480px default
  handle.addEventListener('dblclick', function() {
    panel.style.width = '480px';
    try { localStorage.setItem('npcGraphPanelW', 480); } catch(e) {}
    try { network.redraw(); } catch(e) {}
  });
})();

// 初始化为中文
applyLang('zh');
